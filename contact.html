<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>malena kingston ✦ contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quintessential&family=Cormorant:ital,wght@0,400;0,600;1,400&family=Gloria+Hallelujah&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <a class="home-link" href="index.html">← back to earth</a>
    <h1 class="page-title">contact me ✦</h1>

    <!-- ===== MESSAGE BOX ===== -->
    <div class="card">
      <h2 style="text-align:center;">send me a note 🌙</h2>
      <p style="text-align:center; color:var(--lilac); font-family:'Gloria Hallelujah',cursive; font-size:0.9rem;">
        write to me and it lands straight in my inbox ✦
      </p>

      <!-- ===== ACTIVATE THIS FORM (one-time, free, ~2 min) =====
           1. Go to https://formspree.io and sign up (free) with malenakingstonmusic@gmail.com
           2. Create a new form. It gives you a form ID like "xyzabcd".
           3. Replace YOUR_FORM_ID below with that ID.
           Until you do this, the form button below won't deliver — but the
           "email me directly" button underneath always works. -->
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
        <label>your name
          <input type="text" name="name" required>
        </label>
        <label>your email
          <input type="email" name="email" required>
        </label>
        <label>your message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit" class="send-btn">send ✦</button>
      </form>

      <p style="text-align:center; margin-top:18px;">
        or just
        <a href="mailto:malenakingstonmusic@gmail.com">email me directly →</a>
      </p>
    </div>

    <!-- ===== SOCIALS ===== -->
    <div class="card" style="text-align:center;">
      <h2>find me around the web ✦</h2>
      <img src="images/nav-socials.png" alt="" style="width:150px;margin:6px 0 14px;">
      <div class="socials">
        <a href="https://www.youtube.com/@malenakingston" target="_blank" rel="noopener">youtube</a>
        <a href="https://www.tiktok.com/@malenakingston" target="_blank" rel="noopener">tiktok</a>
        <a href="https://www.instagram.com/malenakingston" target="_blank" rel="noopener">instagram</a>
      </div>
    </div>

    <p class="footer">made with love ✦ malena kingston</p>
  </div>
</body>
</html>
