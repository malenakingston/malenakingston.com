<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>malena kingston ✦ say hi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quintessential&family=Cormorant:ital,wght@0,400;0,600;1,400&family=Gloria+Hallelujah&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <a class="home-link" href="index.html">← back to earth</a>
    <h1 class="page-title">say hi! ✦</h1>

    <!-- ===== Y2K DIGITAL MESSAGE BOX ===== -->
    <div class="digi-card">
      <h2 class="digi-title">say hi!</h2>
      <p class="digi-sub">from you, straight to my inbox</p>

      <form action="https://formspree.io/f/mdaraweb" method="POST" class="contact-form digi-form">
        <label>your name
          <input type="text" name="name" required>
        </label>
        <label>your email
          <input type="email" name="email" required>
        </label>
        <label>your message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit" class="send-btn">send ✦</button>
      </form>

      <p style="text-align:center; margin-top:16px;">
        <a href="mailto:malenakingstonmusic@gmail.com" class="digi-link">or email me directly →</a>
      </p>
    </div>

    <p class="footer">made with love ✦ malena kingston</p>
  </div>
  <script src="sparkles.js"></script>
</body>
</html>
